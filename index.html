<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  </head>
<>
  <h1 class="main-title">Выбери свой продукт</h1>
  <div class="main-container">
    <div class="top-drawing"></div>
    <button id="change-color-all-card">Сменить цвет всех карточек</button>
    <button id="change-color-first-card">Сменить цвет первой карточки</button>
    <button id="open-google">Открыть страницу Google.com</button>
    <button id="output-console-log">Вывести сообщение в консоль лог</button>
    <button id="change-color-button">Изменить цвет кнопки</button>
    <ul id="product-card-list" class="product-grid"></ul>
    <template id="product-cards-template">
      <li class="card-container">
        <img class="product-img" src="" width="290" height="245">
        <span class="product-category"></span>
        <h2 class="product-name"></h2>
        <p class="product-description"></p>
        <span>Состав:</span>
        <ul class="product-compound"></ul>
        <div class="product-price-container">
          <span class="product-price-label">Цена</span>
          <span class="product-price"></span>
        </div>
      </li>
    </template>
  </div>
  <script src="main.js"></script>
  <script src="homework-5.js"></script>
  <script src="homework-6.js"></script>
  <script src="homework-7.js" type="module"></script>
  <script src="homework-8.js" type="module"></script>
  <script src="homework-9.js" type="module"></script>
  <footer>
  <div class="footer-container">
    <div class="footer-info">
      <h2>Product Cards</h2>
      <p>У нас самые лучшие продукты для кожи!</p>
      <div class="footer-social">
        <a href="#"><img src="images/tg.png" alt="Telegram"></a>
        <a href="#"><img src="images/vk.png" alt="VK"></a>
      </div>
    </div>
    <section class="footer-subscribe">
      <p>Подпишись на наши акции:</p>
      <form action="#" method="post">
        <label for="email" class="visually-hidden">Введите Email</label>
        <input type="email" placeholder="Введи Email..." name="email" id="email" required>
        <button type="submit">Подписаться</button>
      </form> 
    </section>
    <nav class="footer-nav">
      <h3>Быстрые ссылки</h3>
      <ul>
        <li><a href="#">Главная</a></li>
        <li><a href="#">Магазин</a></li>
        <li><a href="#">Контакты</a></li>
      </ul>
    </nav>
  </div> <div class="footer-bottom">
    <div class="footer-line"></div>
    <p>www.product-cards.com © all right reserve</p>
  </div>
</footer>
<button id="open-modal-btn">Регистрация</button>
<div class="modal" id="registration-modal">
  <div class="overlay">
    <div class="modal-content">
    <button class="modal-close-btn">&times;</button>
    <h2>Регистрация</h2>
    <form id="register-form">
      <div class="form-group">
        <label for="reg-firstname">Имя:</label>
        <input type="text" id="reg-firstname" placeholder="Введите имя..." required>
      </div>
      <div class="form-group">
        <label for="reg-lastname">Фамилия:</label>
        <input type="text" id="reg-lastname" placeholder="Введите фамилию..." required>
      </div>
      <div class="form-group">
        <label for="reg-birthday">Дата рождения:</label>
        <input type="date" id="reg-birthday" required>
      </div>
      <div class="form-group">
        <label for="reg-login">Логин:</label>
        <input type="text" id="reg-login" placeholder="Придумайте логин..." required>
      </div>
      <div class="form-group">
        <label for="reg-password">Пароль:</label>
        <input type="password" id="reg-password" placeholder="Минимум 6 символов..." minlength="6" required>
      </div>
      <div class="form-group">
        <label for="reg-confirm-password">Повторите пароль:</label>
        <input type="password" id="reg-confirm-password" placeholder="Повторите пароль..." required>
      </div>
      <button type="submit" class="reg-submit-btn">Зарегистрироваться</button>
    </form>
</div>
</div>
</body>
</html>
